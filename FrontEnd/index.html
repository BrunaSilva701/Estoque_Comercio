<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Estoque</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📦 Cadastro de Produtos</h1>
        <form id="form-produto">
            <input type="text" id="descricao" placeholder="Descrição (ex: Teclado)" required>
            <input type="number" id="preco" placeholder="Preço" step="0.01" required>
            <input type="text" id="marca" placeholder="Marca" required>
            <input type="text" id="cor" placeholder="Cor" required>
            <input type="number" id="quantidade" placeholder="Quantidade" required>
            <button type="submit">Salvar Produto</button>
        </form>

        <h2>Produtos em Estoque</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Descrição</th>
                    <th>Preço</th>
                    <th>Qtd</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody id="lista-produtos"></tbody>
        </table>
    </div>
    <script src="script.js"></script>
</body>
</html>
